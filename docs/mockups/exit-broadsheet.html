<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Exit — Dark Broadsheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0A2540;--deep:#071b30;--green:#00A651;--green-dk:#00913f;--clay:#C8814B;--line:rgba(255,255,255,.14);
        --serif:"Libre Caslon Display",Georgia,serif;--ui:"Inter",system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c1a26;font-family:var(--ui);display:flex;flex-direction:column;align-items:center;padding:24px 16px}
  .label{color:#8aa0b2;font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:14px}
  .phone{width:100%;max-width:420px;background:var(--navy);border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;min-height:680px;position:relative}

  /* etched skyline + halftone texture behind hero */
  .tex{position:absolute;inset:0;pointer-events:none;
       background-image:radial-gradient(rgba(255,255,255,.05) .7px,transparent .7px);
       background-size:4px 4px;opacity:.5}
  .sky{position:absolute;left:0;right:0;bottom:0;width:100%;height:200px;opacity:.14;pointer-events:none}

  .head{padding:14px 18px;display:flex;align-items:center;gap:8px;position:relative;z-index:2}
  .head img{width:26px;height:26px;object-fit:contain}
  .head span{color:rgba(255,255,255,.9);font-weight:600;font-size:13px;letter-spacing:.06em}

  .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 26px 40px;position:relative;z-index:2}
  .body img.heed{height:96px;width:auto;margin:0 auto 22px;display:block;filter:drop-shadow(0 8px 18px rgba(0,0,0,.4))}
  .kick{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:14px}
  h1{font-family:var(--serif);color:#fff;font-size:30px;font-weight:400;line-height:1.12;text-shadow:0 2px 14px rgba(0,0,0,.4)}
  .body p{color:rgba(255,255,255,.62);font-size:14.5px;margin-top:14px;line-height:1.55;max-width:34ch}

  .actions{width:100%;margin-top:30px;display:flex;flex-direction:column;gap:11px}
  .cta{width:100%;height:54px;border-radius:13px;background:var(--green);color:#fff;font-weight:700;font-size:16px;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(0,166,81,.3);display:flex;align-items:center;justify-content:center}
  .cta2{width:100%;height:52px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:rgba(255,255,255,.78);font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
  <div class="label">/exit · navy broadsheet · the calm verdict</div>
  <div class="phone">
    <div class="tex"></div>
    <svg class="sky" viewBox="0 0 420 200" fill="none" preserveAspectRatio="xMidYMax meet">
      <g stroke="#ffffff" stroke-width="1.1">
        <path d="M0 200 V150 H22 V120 H40 V150 H64 V90 H86 V150 H110 V70 H120 V55 H132 V70 H140 V150 H168 V110 H190 V150 H214 V64 H226 V40 H238 V64 H248 V150 H276 V100 H300 V150 H322 V82 H344 V150 H368 V120 H392 V150 H420 V200 Z"/>
        <path d="M120 55 V40 M226 40 V22"/>
      </g>
    </svg>

    <div class="head">
      <img src="../../public/brand/heed-mascot.png" alt="">
      <span>THE STEADY ONE</span>
    </div>

    <div class="body">
      <img class="heed" src="../../public/brand/heed-mascot.png" alt="Heed">
      <div class="kick">No rush</div>
      <h1>Waiting is a decision too.</h1>
      <p>The NYC market moves fast, but signing a place you're unsure about is worse than waiting a week. Come back when your head is clear. Your lines will be here.</p>
      <div class="actions">
        <button class="cta">Back to my matches</button>
        <button class="cta2">Back to home</button>
      </div>
    </div>
  </div>
</body>
</html>
